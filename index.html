<!DOCTYPE html>
<html>
<head>
    <title>Escáner Demo 15M</title>
    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            text-align:center;
            padding-top:40px;
        }
        .box{
            margin-top:30px;
            font-size:22px;
            padding:20px;
            border-radius:10px;
            display:inline-block;
        }
        .buy{
            background:#16a34a;
        }
        .sell{
            background:#dc2626;
        }
        button{
            padding:12px 25px;
            font-size:18px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            margin-top:20px;
        }
    </style>
</head>
<body>

    <h1>📊 Escáner Demo 15M</h1>
    <p>Cuenta DEMO - Solo práctica</p>

    <button onclick="scan()">Escanear ahora</button>

    <div id="resultado" class="box"></div>

    <script>
        function scan(){
            var random = Math.random();

            if(random > 0.5){
                document.getElementById("resultado").innerHTML = "🟢 SEÑAL: COMPRAR";
                document.getElementById("resultado").className = "box buy";
            }else{
                document.getElementById("resultado").innerHTML = "🔴 SEÑAL: VENDER";
                document.getElementById("resultado").className = "box sell";
            }
        }
    </script>

</body>
</html>
